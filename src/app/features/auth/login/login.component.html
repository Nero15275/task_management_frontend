
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to manage your daily duties</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="you@example.com" 
          [class.error-input]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        />
        <span class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">
          Email is required.
        </span>
        <span class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">
          Enter a valid email address.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••" 
          [class.error-input]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        />
        <span class="error-msg" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          Password is required.
        </span>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary">
        Sign In
      </button>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/register">Register here</a>
      </div>
    </form>
  </div>
</div>
