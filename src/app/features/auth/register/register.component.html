<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Sign up to start organizing tasks</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          placeholder="johndoe" 
          [class.error-input]="registerForm.get('username')?.touched && registerForm.get('username')?.invalid"
        />
        <span class="error-msg" *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors?.['required']">
          Username is required.
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="you@example.com" 
          [class.error-input]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
        />
        <span class="error-msg" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['required']">
          Email is required.
        </span>
        <span class="error-msg" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['email']">
          Enter a valid email address.
        </span>
      </div>

      <!-- <div class="form-group">
        <label for="role">Role</label>
        <select id="role" formControlName="role">
          <option value="Employee">Employee</option>
          <option value="Team Lead">Team Lead</option>
          <option value="Manager">Manager</option>
        </select>
      </div> -->

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="Minimum 8 characters" 
          [class.error-input]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
        />
        <span class="error-msg" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']">
          Password is required.
        </span>
        <span class="error-msg" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['minlength']">
          Password must be at least 8 characters long.
        </span>
      </div>

      <button type="submit" [disabled]="registerForm.invalid||isLoading" class="btn btn-primary">
        Register Account
      </button>

      <div class="auth-footer">
        Already have an account? <a routerLink="/login">Log In</a>
      </div>
    </form>
  </div>
</div>
